server:
  port: 9001

spring:
  application:
    name: employee-service
  output:
    ansi:
      enabled: ALWAYS
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://${DB_URL}:26257/management_system?sslmode=disable
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.CockroachDialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${DB_URL}:26257/management_system?sslmode=disable
    user: ${DB_USER}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: management_system
            client-secret: ${KEYCLOAK_SECRET}
            authorization-grant-type: client_credentials
            scope: openid,profile,email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}

keycloak:
  realm: ${KEYCLOAK_REALM}
  client: ${KEYCLOAK_CLIENT}
  grant-type: client_credentials
  secret: ${KEYCLOAK_SECRET}
  auth-server-url: ${KEYCLOAK_URL}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}:8761/eureka/

error:
  messages:
    null-or-empty: "Field cannot be null or empty"
    entity-null: "Entity cannot be null"
    field-value-set-prematurely: "Field value set prematurely"
    field-value-invalid: "Field value invalid"
    value-already-exists: "Field value already exists"

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: management-system-app